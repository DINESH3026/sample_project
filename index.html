<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cool Neon Button</title>
  <style>
    body {
      background-color: #0d0d0d;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .neon-btn {
      padding: 15px 40px;
      font-size: 20px;
      font-family: Arial, sans-serif;
      color: #00ffff;
      border: 2px solid #00ffff;
      background: none;
      cursor: pointer;
      transition: 0.3s ease-in-out;
      border-radius: 8px;
      text-transform: uppercase;
      box-shadow: 0 0 10px #00ffff, 0 0 20px #00ffff;
    }

    .neon-btn:hover {
      background-color: #00ffff;
      color: #0d0d0d;
      box-shadow: 0 0 20px #00ffff, 0 0 40px #00ffff, 0 0 60px #00ffff;
      transform: scale(1.1);
    }
  </style>
</head>
<body>
  <button class="neon-btn">sorry dont click Me</button>
</body>
</html>
